name: SDD Pipeline - Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # === QA GATE ===
  qa-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Allow esbuild build script
        run: pnpm config set onlyBuiltDependencies --location project '["esbuild"]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: TypeScript Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm build

  # === SECURITY GATE ===
  security-gate:
    needs: qa-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Dependency Audit
        run: pnpm audit --audit-level=moderate

      - name: Secret scan
        run: |
          ! grep -rEn "(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][A-Za-z0-9_\-]{8,}" src/ index.html *.config.* 2>/dev/null || (echo "Potential secret found in source" && exit 1)

  # === DESIGN GATE (Build Verification) ===
  design-gate:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Allow esbuild build script
        run: pnpm config set onlyBuiltDependencies --location project '["esbuild"]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Verification
        run: pnpm build

      - name: Verify assets exist
        run: |
          ls -la dist/
          ls -la dist/assets/

      - name: Generate CV variants (8 PDFs expected)
        run: |
          node generate-cv-markdown.js
          node generate-profile-cvs.js
          for p in developer hacker research curriculista; do
            for l in es en; do
              if [ ! -f cv-$p-$l.md ]; then
                echo "::error::Missing cv-$p-$l.md"
                exit 1
              fi
            done
          done
          echo "All 8 CV markdown variants generated."

      - name: Verify bundle size
        run: |
          SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null | head -1)
          echo "Bundle size: ${SIZE} bytes"
          if [ "$SIZE" -gt 500000 ]; then
            echo "::warning::Bundle exceeds 500KB"
          fi

  # === DEPLOY (only on main) ===
  deploy:
    needs: design-gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Allow esbuild build script
        run: pnpm config set onlyBuiltDependencies --location project '["esbuild"]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4