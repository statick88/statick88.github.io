name: SDD Pipeline - Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  # === QA GATE ===
  qa-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run shape tests
        run: pnpm test

      - name: Lint
        run: pnpm run lint

      - name: TypeScript Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm build

  # === SECURITY GATE ===
  security-gate:
    needs: qa-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency Audit
        run: pnpm audit --audit-level=moderate --ignore GHSA-5xrq-8626-4rwp --ignore GHSA-4w7w-66w2-5vf9

      - name: Secret scan
        run: |
          ! grep -rEn "(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][A-Za-z0-9_\-]{8,}" src/ index.html *.config.* 2>/dev/null || (echo "Potential secret found in source" && exit 1)

  # === DESIGN GATE (Build Verification) ===
  design-gate:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Verification
        run: pnpm build

      - name: Verify assets exist
        run: |
          ls -la dist/
          ls -la dist/assets/

      - name: Verify _headers in dist
        run: |
          test -f dist/_headers || (echo "::error::dist/_headers missing" && exit 1)
          grep -q "frame-ancestors 'none'" dist/_headers || (echo "::error::frame-ancestors missing" && exit 1)
          ! grep -q "strict-dynamic" dist/_headers || (echo "::error::strict-dynamic found" && exit 1)
          grep -q "X-Frame-Options: DENY" dist/_headers || (echo "::error::X-Frame-Options missing" && exit 1)
          echo "✅ dist/_headers validation passed"

      - name: Generate CV variants (8 PDFs expected)
        run: |
          node generate-cv-markdown.js
          node generate-profile-cvs.js
          for p in developer hacker research docente-facilitador; do
            for l in es en; do
              if [ ! -f cv-$p-$l.md ]; then
                echo "::error::Missing cv-$p-$l.md"
                exit 1
              fi
            done
          done
          echo "All 8 CV markdown variants generated."

      - name: Verify bundle size
        run: |
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null | sort -n | tail -1)
          echo "Main bundle size: ${MAIN_SIZE} bytes"
          if [ "$MAIN_SIZE" -gt 500000 ]; then
            echo "::warning::Main bundle exceeds 500KB"
          fi

  # === DEPLOY (only on main) ===
  deploy:
    needs: design-gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # === VERIFY HEADERS IN PRODUCTION ===
  verify-headers:
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CDN propagation
        run: sleep 45

      - name: Verify CSP headers in production
        run: |
          CSP=$(curl -sI https://statick88.github.io/ | grep -i "content-security-policy" | head -1)
          echo "CSP Header: $CSP"
          echo "$CSP" | grep -q "strict-dynamic" && { echo "::error::strict-dynamic found in production CSP"; exit 1; } || echo "✅ No strict-dynamic"
          echo "$CSP" | grep -q "frame-ancestors 'none'" || { echo "::error::frame-ancestors 'none' missing"; exit 1; }
          echo "✅ frame-ancestors 'none' present"

      - name: Verify X-Frame-Options in production
        run: |
          XFO=$(curl -sI https://statick88.github.io/ | grep -i "x-frame-options" | head -1)
          echo "X-Frame-Options: $XFO"
          echo "$XFO" | grep -qi "deny" || { echo "::error::X-Frame-Options not DENY"; exit 1; }
          echo "✅ X-Frame-Options: DENY"

      - name: Verify Cache-Control for HTML
        run: |
          CC=$(curl -sI https://statick88.github.io/ | grep -i "cache-control" | head -1)
          echo "Cache-Control: $CC"
          echo "$CC" | grep -qi "no-cache\|must-revalidate" || { echo "::warning::Cache-Control could be stricter for HTML"; }

      - name: Verify security headers
        run: |
          HEADERS=$(curl -sI https://statick88.github.io/)
          echo "$HEADERS" | grep -qi "x-content-type-options: nosniff" && echo "✅ X-Content-Type-Options: nosniff" || echo "::warning::X-Content-Type-Options missing"
          echo "$HEADERS" | grep -qi "referrer-policy:" && echo "✅ Referrer-Policy present" || echo "::warning::Referrer-Policy missing"
          echo "$HEADERS" | grep -qi "permissions-policy:" && echo "✅ Permissions-Policy present" || echo "::warning::Permissions-Policy missing"

  # === CSP VIOLATION REPORT ENDPOINT (simulated) ===
  csp-monitor:
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Log CSP monitoring endpoint
        run: |
          echo "CSP violations would be reported to: https://statick88.github.io/api/csp-report"
          echo "Configure CSP report-uri in _headers to enable monitoring"
          echo "Example: Content-Security-Policy: ...; report-uri /api/csp-report"